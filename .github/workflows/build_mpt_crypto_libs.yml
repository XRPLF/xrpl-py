# ──────────────────────────────────────────────────────────────────────────────
# Download MPT Crypto Libraries
#
# Downloads pre-built mpt-crypto shared libraries from an XRPLF/mpt-crypto
# GitHub release and re-uploads them as per-platform workflow artifacts for
# consumption by build_wheels_confidential.yml.
#
# The mpt-crypto project builds and publishes self-contained shared libraries
# (.dylib/.so/.dll) with secp256k1 and OpenSSL statically linked in.
# See: https://github.com/XRPLF/mpt-crypto
#
# Output artifacts (same interface as before):
#   mpt-crypto-linux-x86_64    → libmpt-crypto.so
#   mpt-crypto-darwin-arm64    → libmpt-crypto.dylib
#   mpt-crypto-darwin-x86_64   → libmpt-crypto.dylib
#   mpt-crypto-win32-x86_64    → mpt-crypto.dll
#   mpt-crypto-headers         → secp256k1_mpt.h, utility/mpt_utility.h
# ──────────────────────────────────────────────────────────────────────────────
name: Build MPT Crypto Libraries
on:
  workflow_call:
    inputs:
      mpt_crypto_version:
        description: "mpt-crypto release tag (e.g. 0.3.0-rc2). Defaults to latest."
        required: false
        type: string
      git_ref:
        description: "Git ref to checkout (branch, tag, or SHA)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      mpt_crypto_version:
        description: "mpt-crypto release tag (e.g. 0.3.0-rc2). Leave empty for latest."
        required: false
        type: string
      git_ref:
        description: "Git ref to checkout (branch, tag, or SHA)"
        required: false
        type: string
  push:
    branches:
      - confidential-mpt
    paths:
      - ".github/workflows/build_mpt_crypto_libs.yml"

env:
  MPT_CRYPTO_REPO: XRPLF/mpt-crypto

jobs:
  download:
    name: Download mpt-crypto natives
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      # ── Resolve the release tag ──
      - name: Resolve mpt-crypto version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.mpt_crypto_version }}" ]; then
            TAG="${{ inputs.mpt_crypto_version }}"
          else
            TAG=$(gh release list --repo "$MPT_CRYPTO_REPO" --limit 1 \
                  --json tagName --jq '.[0].tagName')
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "==> Using mpt-crypto release: $TAG"

      # ── Download the combined natives tarball ──
      - name: Download release tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.version }}"
          echo "==> Downloading mpt-crypto-natives-${TAG}.tar.gz"
          gh release download "$TAG" \
            --repo "$MPT_CRYPTO_REPO" \
            --pattern "mpt-crypto-natives-*.tar.gz" \
            --dir /tmp/download
          ls -lh /tmp/download/

      # ── Extract ──
      - name: Extract tarball
        run: |
          mkdir -p /tmp/natives
          tar xzf /tmp/download/mpt-crypto-natives-*.tar.gz -C /tmp/natives
          echo "==> Extracted contents:"
          find /tmp/natives -type f | sort

      # ── Re-upload as per-platform artifacts ──
      # This preserves the artifact interface expected by build_wheels_confidential.yml

      - name: Stage linux-x86_64
        run: |
          mkdir -p output/linux
          cp /tmp/natives/linux-x86-64/libmpt-crypto.so output/linux/
      - uses: actions/upload-artifact@v4
        with:
          name: mpt-crypto-linux-x86_64
          path: output/linux/
          if-no-files-found: error

      - name: Stage darwin-arm64
        run: |
          mkdir -p output/darwin-arm64
          cp /tmp/natives/darwin-aarch64/libmpt-crypto.dylib output/darwin-arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: mpt-crypto-darwin-arm64
          path: output/darwin-arm64/
          if-no-files-found: error

      - name: Stage darwin-x86_64
        run: |
          mkdir -p output/darwin-x86_64
          cp /tmp/natives/darwin-x86-64/libmpt-crypto.dylib output/darwin-x86_64/
      - uses: actions/upload-artifact@v4
        with:
          name: mpt-crypto-darwin-x86_64
          path: output/darwin-x86_64/
          if-no-files-found: error

      - name: Stage win32-x86_64
        run: |
          mkdir -p output/win32
          cp /tmp/natives/win32-x86-64/mpt-crypto.dll output/win32/
      - uses: actions/upload-artifact@v4
        with:
          name: mpt-crypto-win32-x86_64
          path: output/win32/
          if-no-files-found: error

      - name: Stage headers
        run: |
          mkdir -p output/include/utility
          cp /tmp/natives/include/secp256k1_mpt.h output/include/
          cp /tmp/natives/include/utility/mpt_utility.h output/include/utility/
      - uses: actions/upload-artifact@v4
        with:
          name: mpt-crypto-headers
          path: output/include/
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Test: verify the shared libraries load correctly and pass unit tests
  # ──────────────────────────────────────────────────────────────────────────
  test_libraries:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    needs: [download]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, macos-15-intel, windows-2022]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install project dependencies
        run: |
          poetry install --no-root --extras confidential
          poetry run pip install setuptools

      # Download the shared library for this platform
      - name: Determine artifact name
        id: artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "name=mpt-crypto-linux-x86_64" >> "$GITHUB_OUTPUT"
            echo "lib_subdir=linux" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" == "arm64" ]; then
              echo "name=mpt-crypto-darwin-arm64" >> "$GITHUB_OUTPUT"
            else
              echo "name=mpt-crypto-darwin-x86_64" >> "$GITHUB_OUTPUT"
            fi
            echo "lib_subdir=darwin" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            echo "name=mpt-crypto-win32-x86_64" >> "$GITHUB_OUTPUT"
            echo "lib_subdir=win32" >> "$GITHUB_OUTPUT"
          fi

      - name: Download shared library
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: xrpl/core/confidential/libs/${{ steps.artifact.outputs.lib_subdir }}

      - name: Download headers
        uses: actions/download-artifact@v4
        with:
          name: mpt-crypto-headers
          path: xrpl/core/confidential/include

      - name: Verify downloaded files
        shell: bash
        run: |
          echo "=== Shared library ==="
          ls -lh xrpl/core/confidential/libs/${{ steps.artifact.outputs.lib_subdir }}/
          echo ""
          echo "=== Headers ==="
          ls -lh xrpl/core/confidential/include/
          ls -lh xrpl/core/confidential/include/utility/ 2>/dev/null || true

      - name: Build CFFI extension
        shell: bash
        run: |
          cd xrpl/core/confidential
          if [ "$RUNNER_OS" == "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" == "arm64" ]; then
              export ARCHFLAGS="-arch arm64"
              export _PYTHON_HOST_PLATFORM="macosx-14.0-arm64"
            else
              export ARCHFLAGS="-arch x86_64"
              export _PYTHON_HOST_PLATFORM="macosx-10.9-x86_64"
            fi
          fi
          poetry run python build_mpt_crypto.py

      - name: Run confidential MPT tests
        shell: bash
        run: |
          # Set library path so the shared lib can be found at runtime
          if [ "$RUNNER_OS" == "Linux" ]; then
            export LD_LIBRARY_PATH="$PWD/xrpl/core/confidential/libs/linux:$LD_LIBRARY_PATH"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            export DYLD_LIBRARY_PATH="$PWD/xrpl/core/confidential/libs/darwin:$DYLD_LIBRARY_PATH"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            export PATH="$PWD/xrpl/core/confidential/libs/win32:$PATH"
          fi
          poetry run python -m unittest discover -s tests/unit/core/confidential -v
