name: Unit test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: "Git ref (branch, tag, or SHA) to test"
        required: false
        type: string
        default: ""

env:
  POETRY_VERSION: 2.1.1

jobs:
  lint-and-type-check:
    name: Lint and type-check
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.8"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Load cached .local
        id: cache-poetry
        uses: actions/cache@v4
        with:
          path: /home/runner/.local
          key: dotlocal-${{ env.POETRY_VERSION }}

      - name: Install poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://install.python-poetry.org/ | python - --version ${{ env.POETRY_VERSION }}
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python + Retrieve Poetry dependencies from cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "poetry"

      - name: Display Python version
        run: |
          python -c "import sys; print(sys.version)"

      - name: Install poetry dependencies
        run: poetry install

      - name: Lint
        run: |
          poetry run poe lint

      - name: Type-check
        run: |
          poetry run mypy --strict --implicit-reexport xrpl

  unit-test:
    name: Unit test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Load cached .local
        id: cache-poetry
        uses: actions/cache@v4
        with:
          path: /home/runner/.local
          key: dotlocal-${{ env.POETRY_VERSION }}

      - name: Install poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://install.python-poetry.org/ | python - --version ${{ env.POETRY_VERSION }}
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python + Retrieve Poetry dependencies from cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Display Python version
        run: |
          python -c "import sys; print(sys.version)"

      - name: Install poetry dependencies
        run: poetry install

      - name: Unit test (excluding confidential)
        run: |
          poetry run coverage run -m unittest discover -s tests/unit -p "test_*.py" --ignore-patterns "test_utility_layer.py"
          poetry run coverage report --fail-under=85

  unit-test-confidential:
    name: Unit test (confidential)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Download mpt-crypto libraries
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build_mpt_crypto_libs.yml
          name: mpt-crypto-linux-x86_64
          path: artifacts/mpt-crypto-linux-x86_64
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Copy libraries and headers
        run: |
          mkdir -p xrpl/core/confidential/libs/linux
          mkdir -p xrpl/core/confidential/include/utility

          # Copy libraries
          cp artifacts/mpt-crypto-linux-x86_64/xrpl/core/confidential/libs/linux/*.a xrpl/core/confidential/libs/linux/ 2>/dev/null || \
            cp artifacts/mpt-crypto-linux-x86_64/libs/linux/*.a xrpl/core/confidential/libs/linux/ 2>/dev/null || \
            cp artifacts/mpt-crypto-linux-x86_64/*.a xrpl/core/confidential/libs/linux/ 2>/dev/null || true

          # Copy headers
          if [ -d "artifacts/mpt-crypto-linux-x86_64/xrpl/core/confidential/include" ]; then
            cp artifacts/mpt-crypto-linux-x86_64/xrpl/core/confidential/include/*.h xrpl/core/confidential/include/
            cp artifacts/mpt-crypto-linux-x86_64/xrpl/core/confidential/include/utility/*.h xrpl/core/confidential/include/utility/ 2>/dev/null || true
          elif [ -d "artifacts/mpt-crypto-linux-x86_64/include" ]; then
            cp artifacts/mpt-crypto-linux-x86_64/include/*.h xrpl/core/confidential/include/
            cp artifacts/mpt-crypto-linux-x86_64/include/utility/*.h xrpl/core/confidential/include/utility/ 2>/dev/null || true
          fi

          echo "=== Library files ==="
          ls -la xrpl/core/confidential/libs/linux/ || echo "No libraries found"
          echo "=== Header files ==="
          ls -la xrpl/core/confidential/include/ || echo "No headers found"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Load cached .local
        id: cache-poetry
        uses: actions/cache@v4
        with:
          path: /home/runner/.local
          key: dotlocal-${{ env.POETRY_VERSION }}

      - name: Install poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://install.python-poetry.org/ | python - --version ${{ env.POETRY_VERSION }}
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python + Retrieve Poetry dependencies from cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Display Python version
        run: |
          python -c "import sys; print(sys.version)"

      - name: Install poetry dependencies with confidential extras
        run: |
          poetry install --extras confidential
          poetry run pip install setuptools

      - name: Build C extension
        run: |
          cd xrpl/core/confidential
          poetry run python build_mpt_crypto.py

      - name: Run confidential unit tests
        run: |
          poetry run python -m unittest discover -s tests/unit/core/confidential -v
