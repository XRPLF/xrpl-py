name: Build Confidential MPT Wheels

on:
  workflow_call:
    inputs:
      git_ref:
        description: "Git ref to checkout (branch, tag, or SHA)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to checkout (branch, tag, or SHA)"
        required: false
        type: string
        default: "confidential-mpt"
  push:
    branches:
      - confidential-mpt
    paths:
      - ".github/workflows/build_wheels_confidential.yml"
      - "xrpl/core/confidential/build_mpt_crypto.py"

jobs:
  build-wheels:
    name: Build wheel on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15-intel, macos-14, windows-2022]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Determine artifact name
        id: artifact-name
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "name=mpt-crypto-linux-x86_64" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" == "arm64" ]; then
              echo "name=mpt-crypto-darwin-arm64" >> "$GITHUB_OUTPUT"
            else
              echo "name=mpt-crypto-darwin-x86_64" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$RUNNER_OS" == "Windows" ]; then
            echo "name=mpt-crypto-win32-x86_64" >> "$GITHUB_OUTPUT"
          fi

      # Download the shared library artifact for this platform
      - name: Download shared library
        id: download-libs
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: artifacts/libs

      # Download headers (only built once, from Linux)
      - name: Download headers
        id: download-headers
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mpt-crypto-headers
          path: artifacts/headers

      - name: Check download status
        if: steps.download-libs.outcome == 'failure'
        run: |
          echo "::warning::Failed to download mpt-crypto shared library. This is expected if running standalone."
          echo "Wheel will be built without native libraries (pure Python fallback)."

      - name: Copy shared library and headers
        shell: bash
        run: |
          LIB_SUBDIR=""
          if [ "$RUNNER_OS" == "Linux" ]; then LIB_SUBDIR="linux"; fi
          if [ "$RUNNER_OS" == "macOS" ]; then LIB_SUBDIR="darwin"; fi
          if [ "$RUNNER_OS" == "Windows" ]; then LIB_SUBDIR="win32"; fi

          mkdir -p "xrpl/core/confidential/libs/$LIB_SUBDIR"
          mkdir -p xrpl/core/confidential/include/utility

          # Copy shared library (flatten any nested paths)
          echo "=== Copying shared library ==="
          if [ "$RUNNER_OS" == "Windows" ]; then
            find artifacts/libs -name "*.dll" -exec cp {} "xrpl/core/confidential/libs/$LIB_SUBDIR/" \; 2>/dev/null || true
            find artifacts/libs -name "*.lib" -exec cp {} "xrpl/core/confidential/libs/$LIB_SUBDIR/" \; 2>/dev/null || true
          elif [ "$RUNNER_OS" == "macOS" ]; then
            find artifacts/libs -name "*.dylib" -exec cp {} "xrpl/core/confidential/libs/$LIB_SUBDIR/" \; 2>/dev/null || true
          else
            find artifacts/libs -name "*.so" -exec cp {} "xrpl/core/confidential/libs/$LIB_SUBDIR/" \; 2>/dev/null || true
          fi

          # Copy headers
          echo "=== Copying headers ==="
          find artifacts/headers -name "secp256k1_mpt.h" -exec cp {} xrpl/core/confidential/include/ \; 2>/dev/null || true
          find artifacts/headers -name "secp256k1.h" -exec cp {} xrpl/core/confidential/include/ \; 2>/dev/null || true
          find artifacts/headers -name "mpt_utility.h" -exec cp {} xrpl/core/confidential/include/utility/ \; 2>/dev/null || true

          echo "=== Shared library ==="
          ls -lh "xrpl/core/confidential/libs/$LIB_SUBDIR/" 2>/dev/null || echo "No library found"
          echo "=== Headers ==="
          ls -lh xrpl/core/confidential/include/ 2>/dev/null || echo "No headers found"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry wheel

      - name: Install build dependencies
        run: |
          poetry install --no-root --extras confidential
          poetry run pip install setuptools

      - name: Build CFFI extension
        shell: bash
        run: |
          cd xrpl/core/confidential
          if [ "$RUNNER_OS" == "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" == "arm64" ]; then
              export ARCHFLAGS="-arch arm64"
            else
              export ARCHFLAGS="-arch x86_64"
            fi
            echo "Building for macOS $ARCH"
          fi
          # Only build if shared library exists
          if ls libs/*/*.so libs/*/*.dylib libs/*/*.dll 2>/dev/null; then
            poetry run python build_mpt_crypto.py
            echo "CFFI extension built successfully"
            echo "CFFI_BUILT=true" >> $GITHUB_ENV
          else
            echo "No shared library found, skipping CFFI build (pure Python wheel)"
            echo "CFFI_BUILT=false" >> $GITHUB_ENV
          fi

      - name: Build wheel with Poetry
        run: poetry build -f wheel

      - name: Retag wheel with platform tag
        shell: bash
        run: |
          # Get Python version info
          PY_VERSION=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")

          # Determine platform tag
          if [ "$RUNNER_OS" == "Linux" ]; then
            PLATFORM="manylinux_2_17_x86_64.manylinux2014_x86_64"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            # Detect architecture for macOS
            ARCH=$(uname -m)
            if [ "$ARCH" == "arm64" ]; then
              PLATFORM="macosx_11_0_arm64"
            else
              PLATFORM="macosx_10_9_x86_64"
            fi
          elif [ "$RUNNER_OS" == "Windows" ]; then
            PLATFORM="win_amd64"
          fi

          echo "Platform tag: $PLATFORM"

          # Retag the wheel
          cd dist
          for whl in *-py3-none-any.whl; do
            echo "Original wheel: $whl"

            # Use wheel tags command to properly retag (creates new file)
            python -m wheel tags --python-tag="${PY_VERSION}" --abi-tag="${PY_VERSION}" --platform-tag="${PLATFORM}" "$whl"

            # Delete the original py3-none-any wheel to avoid conflicts
            echo "Removing original: $whl"
            rm "$whl"

            echo "Remaining wheels:"
            ls -la *.whl
          done

      - name: List wheel contents
        shell: bash
        run: |
          echo "=== Wheel contents ==="
          for whl in dist/*.whl; do
            echo ""
            echo "Wheel: $whl"
            echo "Size: $(du -h "$whl" | cut -f1)"
            echo ""
            echo "Native files:"
            unzip -l "$whl" | grep -E "\.so|\.pyd|\.dylib|\.dll|_mpt_crypto" || echo "No compiled extensions found"
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
